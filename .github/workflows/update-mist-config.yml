name: Update MIST config

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-mist-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install package
        run: pip install .

      - name: Update MIST config
        run: python -c "from isoc.mist_config import update_config; update_config()"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add isoc/mist_config.json
          git diff --cached --quiet || git commit -m "Auto-update MIST config [skip ci]"
          git push
